<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HedShop</title>
    <link rel="stylesheet" href="style.css">
    <!-- Подключаем API Телеграма -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app">
        <!-- Заголовок -->
        <header>
            <div class="logo">HedShop</div>
            <div class="cart-icon" onclick="toggleCart()">🛒 <span id="cart-count">0</span></div>
        </header>

        <!-- Каталог товаров -->
        <div id="catalog" class="page active">
            <h2>Все товары</h2>
            <div class="products-grid" id="products-container">
                <!-- Товары генерируются через JS -->
            </div>
        </div>

        <!-- Корзина -->
        <div id="cart" class="page">
            <h2>Корзина</h2>
            <div id="cart-items"></div>
            <div class="cart-summary">
                <div class="total-row">
                    <span>Итого:</span>
                    <span id="cart-total-price">0 ₽</span>
                </div>
                <button class="pay-btn" onclick="checkout()">Перейти к оплате ➔</button>
                <button class="back-btn" onclick="toggleCart()">Назад в каталог</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
